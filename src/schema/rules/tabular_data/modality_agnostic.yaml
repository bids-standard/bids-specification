---
Participants:
  selectors:
    - path == "/participants.tsv"
  initial_columns:
    - participant_id
  columns:
    participant_id:
      level: required
      description_addendum: |
        There MUST be exactly one row for each participant.
    species: recommended
    age: recommended
    sex: recommended
    handedness: recommended
    strain: recommended
    strain_rrid: recommended
    HED: optional
  index_columns: [participant_id]
  additional_columns: allowed

Phenotypes:
  selectors:
    - datatype == 'phenotype'
    - extension == ".tsv"
    - '!intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])'
  initial_columns:
    - participant_id
  columns:
    participant_id:
      level: required
    HED: optional
  index_columns: [participant_id]
  additional_columns: allowed

Phenotypes__Additional:
  $ref: rules.tabular_data.modality_agnostic.Phenotypes
  selectors:
    - datatype == 'phenotype'
    - suffix == 'phenotype'
    - intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])
  additional_columns: allowed_if_defined

Samples:
  selectors:
    - path == "/samples.tsv"
  columns:
    sample_id: required
    participant_id: required
    sample_type: required
    pathology: recommended
    derived_from: recommended
  index_columns: [sample_id, participant_id]
  additional_columns: allowed

Scans:
  selectors:
    - suffix == "scans"
    - extension == ".tsv"
  initial_columns:
    - filename
  columns:
    filename:
      level: required
      description_addendum: |
        There MUST be exactly one row for each file.
    acq_time__scans: optional
    HED: optional
  index_columns: [filename]
  additional_columns: allowed

Sessions:
  selectors:
    - suffix == "sessions"
    - extension == ".tsv"
    - '!intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])'
  initial_columns:
    - session_id
  columns:
    session_id:
      level: required
      description_addendum: |
        There MUST be exactly one row for each session.
    acq_time__sessions: optional
    pathology: recommended
    HED: optional
  index_columns: [session_id]
  additional_columns: allowed

Sessions__Additional:
  $ref: rules.tabular_data.modality_agnostic.Sessions
  selectors:
    - suffix == "sessions"
    - extension == ".tsv"
    - intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])
  columns:
    $ref: rules.tabular_data.modality_agnostic.Sessions.columns
    acq_time__sessions: recommended
  additional_columns: allowed_if_defined
