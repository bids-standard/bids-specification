---
# BIDS Validator Original Issue Code #74
# Was DUPLICATE_NIFTI_FILES, but applies generally
DuplicateFiles:
  issue:
    code: DUPLICATE_FILES
    message: |
      File exists with and without `.gz` extension.
    level: error
  selectors:
    - match(extension, '\.gz$')
  checks:
    - exists(substr(path, 0, length(path) - 3), "dataset") == 0

ReadmeFileSmall:
  issue:
    code: README_FILE_SMALL
    message: |
      The recommended file '/README' is very small.
      Please consider expanding it with additional information about the dataset.
    level: warning
  selectors:
    - match(path, '^/README')
  checks:
    - size > 150

DuplicateReadmes:
  issue:
    code: MULTIPLE_README_FILES
    message: |
      There are multiple '/README' files (with different extensions) in this BIDS
      dataset. Only one '/README' file should exist.
    level: error
  selectors:
    - match(path, '^/README.*')
  checks:
    - exists(["README", "README.md", "README.rst", "README.txt"], "dataset") == 1

SegregatedSessions:
  issue:
    code: SEGREGATED_SESSIONS
    message: |
      Session files were detected outside the dataset root and
      "Phenotype" additional validation has been enabled.
      Aggregate session data in a root-level `sessions.tsv` file.
    level: error
  selectors:
    - suffix == 'sessions'
    - extension == '.tsv'
    - intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])
  checks:
    - type(entities.subject) == 'null'

SessionRequired:
  issue:
    code: SESSION_REQUIRED
    message: |
      Multi-session data is detected in the dataset, and
      "Phenotype" additional validation has been enabled.
      Every data file MUST be found in a session directory.
    level: error
  selectors:
    - type(entities.subject) != 'null'
    - "!intersects([extension], ['.tsv', '.json'])"
    - type(dataset.sessions_tsv) != 'null'
    - intersects(dataset.dataset_description.AdditionalValidation, ["Phenotype"])
  checks:
    - type(entities.session) != 'null'
