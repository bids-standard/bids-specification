# Rules for phenotype files
---

# 51
PhenotypeSubjectsMissing:
  issue:
    code: PHENOTYPE_SUBJECTS_MISSING
    message: |
      A phenotype/ .tsv file lists subjects that were not found in
      the participant_id column found in the participants.tsv file.
    level: error
  selectors:
    - datatype == 'phenotype'
    - suffix == '.tsv'
    - type(dataset.participant_tsv.participant_id) != 'null'
  checks:
    - |
      length(intersects(columns.participant_id, dataset.participant_tsv.participant_id))
      == length(dataset.participant_tsv.participant_id)
