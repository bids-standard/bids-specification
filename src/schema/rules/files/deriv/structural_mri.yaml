# This document implements the structural MRI derivatives specification.
---
cortical_surfaces:
  $ref:
    - meta.templates.deriv.base
    - meta.templates.raw.mri.entities
  suffixes:
    - white
    - smoothwm
    - pial
    - midthickness
    - inflated
    - vinflated
    - sphere
    - flat
  extensions:
    - .json

cortical_surfaces_giftis:
  $ref: rules.files.deriv.structural_mri.cortical_surfaces
  entities:
    hemi: required
  extensions:
    - .surf.gii

cortical_surfaces_ciftis:
  $ref: rules.files.deriv.structural_mri.cortical_surfaces
  extensions:
    - .dscalar.nii

surface_mapped_scalars:
  $ref:
    - meta.templates.deriv.base
    - meta.templates.raw.mri.entities
  suffixes:
    - curv
    - thickness
    - area
    - dist
    - defects
    - sulc
    - T1wT2wratio
    - distortion
  extensions:
    - .json

surface_mapped_scalars_giftis:
  $ref: rules.files.deriv.structural_mri.surface_mapped_scalars
  entities:
    hemi: required
  extensions:
    - .shape.gii

surface_mapped_scalars_ciftis:
  $ref: rules.files.deriv.structural_mri.surface_mapped_scalars
  extensions:
    - .dscalar.nii

morphometrics:
  $ref:
    - meta.templates.deriv.base
    - meta.templates.raw.mri.entities
  suffixes:
    - morph
  extensions:
    - .tsv
    - .json
  columns:
    index: required
    name: required
    centroid: optional
    volume: optional
    intensity: optional
    thickness: optional
    area: optional
    curv: optional
  additional_columns: allowed_if_defined
