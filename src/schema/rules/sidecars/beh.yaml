#
# Groups of related metadata fields
#
# Assumptions: never need disjunction of selectors
# Assumptions: top-to-bottom overrides is sufficient logic

---
# Metadata for either beh or events files
BEHTaskInformation:
  selectors:
    - datatype == "beh"
    - intersects([suffix], ["beh", "events"])
  fields:
    TaskName: recommended
    Instructions: recommended
    TaskDescription: recommended
    CogAtlasID: recommended
    CogPOID: recommended

BEHInstitutionInformation:
  selectors:
    - datatype == "beh"
    - intersects([suffix], ["beh", "events"])
  fields:
    InstitutionName: recommended
    InstitutionAddress: recommended
    InstitutionalDepartmentName: recommended

# Behavioral-specific metadata for media files.
# General audio/video/image stream properties (codecs, sample rate, dimensions,
# frame rate, duration) are defined by the common media rules in
# `rules/sidecars/media.yaml` and apply to these suffixes regardless of datatype.
AudioVideoImageDevice:
  selectors:
    - datatype == "beh"
    - intersects([suffix], ["audio", "video", "audiovideo", "image"])
  fields:
    Device: optional
    DeviceSerialNumber: optional
    License: optional

CameraProperties:
  selectors:
    - datatype == "beh"
    - intersects([suffix], ["video", "audiovideo", "image"])
  fields:
    CameraPosition: optional
